name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish static binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/vapx-scan
          mkdir -p dist
          cp "$BIN" dist/vapx-scan-linux-amd64
          cd dist
          sha256sum vapx-scan-linux-amd64 > vapx-scan-linux-amd64.sha256
          tar -czf vapx-scan-${GITHUB_REF_NAME}-linux-amd64.tar.gz vapx-scan-linux-amd64
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vapx-scan-linux-amd64
            dist/vapx-scan-linux-amd64.sha256
            dist/vapx-scan-*-linux-amd64.tar.gz
