name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
          - name: linux-armv7
            target: armv7-unknown-linux-musleabihf
          - name: linux-armv6
            target: arm-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          BIN=target/${{ matrix.target }}/release/vapx-scan
          OUT=vapx-scan-${{ matrix.name }}
          mkdir -p dist
          cp "$BIN" "dist/$OUT"
          cd dist
          sha256sum "$OUT" > "$OUT.sha256"
          tar -czf "vapx-scan-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz" "$OUT"
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            dist/vapx-scan-${{ matrix.name }}
            dist/vapx-scan-${{ matrix.name }}.sha256
            dist/vapx-scan-*-${{ matrix.name }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/vapx-scan-linux-*
            dist/vapx-scan-*-linux-*.tar.gz
